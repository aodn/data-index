name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Read Project Name
        id: pyproject_name
        uses: sravinet/toml-select@v1.0.1
        with:
          file: "pyproject.toml"
          field: "project.name"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0 

      - name: Resolve tag <- workflow_dispatch || commit tag
        id: vars
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Inject tag -> pyproject.toml
        run: |
          CLEAN_VERSION=$(echo "${{ env.TAG }}" | sed 's/^v//')
          uvx toml-cli set pyproject.toml project.version "$CLEAN_VERSION"

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Build python wheel/sdist
        run: uv build

      - name: Build and test Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          tags: ${{ steps.pyproject_name.outputs.value }}:latest,${{ steps.pyproject_name.outputs.value }}:${{ env.TAG }}
          outputs: type=cacheonly
          build-args: |
            VERSION=$TAG

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            dist/* \
            --generate-notes \
            --title "Release $TAG"
        env:
          GH_TOKEN: ${{ github.token }}