name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads the full tag history to derive the version

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Test
        run: uv run pytest tests/ -v

      - name: Build
        run: uv build

      - name: Resolve tag
        run: echo "TAG=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> $GITHUB_ENV

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and test Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.TAG }}

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            dist/* \
            --generate-notes \
            --title "Release $TAG"
        env:
          GH_TOKEN: ${{ github.token }}
