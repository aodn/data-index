name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads the full tag history to derive the version

      - name: Resolve tag
        id: vars
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          echo "TAG=$TAG" >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Build python wheel/sdist
        run: uv build

      # 5. Build the Docker container up to the 'test' target
      # This acts as your integration test block. If pytest fails inside the Dockerfile, this step fails.
      - name: Build and test Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          build-args: |
            VERSION=${{ env.TAG }}

      # 6. Draft/Create the actual GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create "$TAG" \
            dist/* \
            --generate-notes \
            --title "Release $TAG"
        env:
          GH_TOKEN: ${{ github.token }}